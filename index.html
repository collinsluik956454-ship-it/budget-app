<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budgetplan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #13151a; --kaart: #1c1f26; --rand: #2a2f3d;
    --tekst: #e2e4ec; --zacht: #7a7f92;
    --groen: #1ec87e; --rood: #f04848; --blauw: #4f8ef7;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--tekst); min-height: 100vh; padding-bottom: 3rem; }

  header { background: var(--kaart); border-bottom: 1px solid var(--rand); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  .maand-nav { display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--zacht); }
  .nav-btn { background: var(--rand); border: none; color: var(--tekst); width: 30px; height: 30px; border-radius: 7px; cursor: pointer; font-size: 1rem; }
  .nav-btn:hover { background: #363b4f; }

  .pagina { max-width: 700px; margin: 0 auto; padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 1rem; }

  /* Saldo balk */
  .saldo-balk { background: var(--kaart); border: 1px solid var(--rand); border-radius: 14px; padding: 1.25rem 1.5rem; display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: center; }
  .saldo-hoofd { flex: 1; min-width: 140px; }
  .saldo-label { font-size: 0.7rem; color: var(--zacht); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.2rem; }
  .saldo-bedrag { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; }
  .saldo-bedrag.ok   { color: var(--groen); }
  .saldo-bedrag.over { color: var(--rood); }
  .saldo-bedrag.nul  { color: var(--zacht); }
  .mini-stats { display: flex; gap: 0.75rem; }
  .mini-stat { background: #161920; border-radius: 10px; padding: 0.65rem 1rem; min-width: 110px; }
  .mini-label { font-size: 0.67rem; color: var(--zacht); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.15rem; }
  .mini-waarde { font-size: 1.1rem; font-weight: 700; }
  .mini-waarde.groen { color: var(--groen); }
  .mini-waarde.rood  { color: var(--rood); }

  /* Secties */
  .sectie { background: var(--kaart); border: 1px solid var(--rand); border-radius: 14px; overflow: hidden; }
  .sectie-header { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.1rem; border-bottom: 1px solid var(--rand); }
  .sectie-titel { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .sectie-titel.groen { color: var(--groen); }
  .sectie-titel.rood  { color: var(--rood); }
  .sectie-totaal { font-size: 1rem; font-weight: 700; }
  .sectie-totaal.groen { color: var(--groen); }
  .sectie-totaal.rood  { color: var(--rood); }

  /* Rijen */
  .rij { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.1rem; border-bottom: 1px solid var(--rand); }
  .rij:last-child { border-bottom: none; }
  .rij-naam { flex: 1; }
  .rij-naam input { background: transparent; border: none; color: var(--tekst); font-size: 0.95rem; width: 100%; outline: none; }
  .rij-naam input::placeholder { color: var(--zacht); }
  .rij-bedrag input {
    background: #161920; border: 1px solid var(--rand); border-radius: 7px;
    padding: 0.45rem 0.65rem; color: var(--tekst); font-size: 0.95rem;
    width: 110px; outline: none; text-align: right; transition: border-color 0.15s;
  }
  .rij-bedrag input:focus { border-color: var(--blauw); }
  .del-btn { background: none; border: none; color: var(--rand); cursor: pointer; font-size: 1rem; transition: color 0.15s; flex-shrink: 0; }
  .del-btn:hover { color: var(--rood); }

  /* Toevoeg rij */
  .toevoeg-rij { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 1.1rem; }
  .toevoeg-rij input { background: transparent; border: none; color: var(--zacht); font-size: 0.9rem; flex: 1; outline: none; }
  .toevoeg-rij input::placeholder { color: var(--rand); }
  .plus-btn { background: none; border: 1px solid var(--rand); color: var(--zacht); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .plus-btn:hover { background: var(--rand); color: var(--tekst); }

  /* Acties */
  .acties { display: flex; gap: 0.5rem; }
  .actie-knop { padding: 0.65rem 1rem; border-radius: 8px; border: 1px solid var(--rand); background: transparent; color: var(--zacht); font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
  .actie-knop:hover { background: var(--rand); color: var(--tekst); }
  .actie-knop.pdf { border-color: var(--blauw); color: var(--blauw); }
  .actie-knop.pdf:hover { background: rgba(79,142,247,0.1); }

  /* Toast */
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #2a2f3d; color: var(--tekst); padding: 0.65rem 1.25rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 99; white-space: nowrap; }
  .toast.zichtbaar { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>📋 Budgetplan</h1>
  <div class="maand-nav">
    <button class="nav-btn" onclick="wisselMaand(-1)">‹</button>
    <span id="maandLabel" style="min-width:130px;text-align:center"></span>
    <button class="nav-btn" onclick="wisselMaand(1)">›</button>
  </div>
</header>

<div class="pagina">

  <!-- Saldo -->
  <div class="saldo-balk">
    <div class="saldo-hoofd">
      <div class="saldo-label">Saldo</div>
      <div class="saldo-bedrag nul" id="saldoBedrag">€ 0,00</div>
    </div>
    <div class="mini-stats">
      <div class="mini-stat">
        <div class="mini-label">Inkomsten</div>
        <div class="mini-waarde groen" id="totaalIn">€ 0,00</div>
      </div>
      <div class="mini-stat">
        <div class="mini-label">Uitgaven</div>
        <div class="mini-waarde rood" id="totaalUit">€ 0,00</div>
      </div>
    </div>
  </div>

  <!-- Inkomsten -->
  <div class="sectie">
    <div class="sectie-header">
      <span class="sectie-titel groen">＋ Inkomsten</span>
      <span class="sectie-totaal groen" id="labelIn">€ 0,00</span>
    </div>
    <div id="lijstIn"></div>
    <div class="toevoeg-rij">
      <input type="text" id="nieuwInNaam" placeholder="Omschrijving toevoegen..." maxlength="50"
        onkeydown="if(event.key==='Enter') voegToe('in')">
      <button class="plus-btn" onclick="voegToe('in')">＋</button>
    </div>
  </div>

  <!-- Uitgaven -->
  <div class="sectie">
    <div class="sectie-header">
      <span class="sectie-titel rood">－ Uitgaven</span>
      <span class="sectie-totaal rood" id="labelUit">€ 0,00</span>
    </div>
    <div id="lijstUit"></div>
    <div class="toevoeg-rij">
      <input type="text" id="nieuwUitNaam" placeholder="Omschrijving toevoegen..." maxlength="50"
        onkeydown="if(event.key==='Enter') voegToe('uit')">
      <button class="plus-btn" onclick="voegToe('uit')">＋</button>
    </div>
  </div>

  <!-- Acties -->
  <div class="acties">
    <button class="actie-knop pdf" onclick="exportPDF()">📄 PDF Export</button>
    <button class="actie-knop" onclick="kopieerVorig()">📋 Kopieer vorige maand</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const MAANDEN = ['Januari','Februari','Maart','April','Mei','Juni',
                 'Juli','Augustus','September','Oktober','November','December'];

let huidigJaar  = new Date().getFullYear();
let huidigMaand = new Date().getMonth();

function sleutel() { return `budgetplan2-${huidigJaar}-${huidigMaand}`; }
function laad() { return JSON.parse(localStorage.getItem(sleutel()) || '{"in":[],"uit":[]}'); }
function sla(data) { localStorage.setItem(sleutel(), JSON.stringify(data)); }

function wisselMaand(r) {
  huidigMaand += r;
  if (huidigMaand > 11) { huidigMaand = 0; huidigJaar++; }
  if (huidigMaand < 0)  { huidigMaand = 11; huidigJaar--; }
  teken();
}

function fmt(n) {
  return '€\u00a0' + n.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function voegToe(type) {
  const inputEl = document.getElementById(type === 'in' ? 'nieuwInNaam' : 'nieuwUitNaam');
  const naam = inputEl.value.trim();
  if (!naam) return;
  const data = laad();
  data[type].push({ id: Date.now(), naam, bedrag: 0 });
  sla(data);
  inputEl.value = '';
  teken();
  // Focus terug op invoerveld
  setTimeout(() => inputEl.focus(), 50);
}

function verwijder(type, id) {
  const data = laad();
  data[type] = data[type].filter(r => r.id !== id);
  sla(data);
  teken();
}

function updateNaam(type, id, waarde) {
  const data = laad();
  const rij = data[type].find(r => r.id === id);
  if (rij) { rij.naam = waarde; sla(data); tekenTotalen(data); }
}

function updateBedrag(type, id, waarde) {
  const data = laad();
  const rij = data[type].find(r => r.id === id);
  if (rij) { rij.bedrag = parseFloat(waarde) || 0; sla(data); tekenTotalen(data); }
}

function kopieerVorig() {
  let vM = huidigMaand - 1, vJ = huidigJaar;
  if (vM < 0) { vM = 11; vJ--; }
  const oud = JSON.parse(localStorage.getItem(`budgetplan2-${vJ}-${vM}`) || 'null');
  if (!oud) { toonToast('Geen plan gevonden voor vorige maand.'); return; }
  const huidig = laad();
  if ((huidig.in.length || huidig.uit.length) && !confirm('Huidige inhoud vervangen?')) return;
  const nieuw = {
    in:  oud.in.map(r  => ({ ...r, id: Date.now() + Math.random(), bedrag: 0 })),
    uit: oud.uit.map(r => ({ ...r, id: Date.now() + Math.random(), bedrag: 0 }))
  };
  sla(nieuw);
  teken();
  toonToast('Gekopieerd van ' + MAANDEN[vM] + ' ✓');
}

function toonToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('zichtbaar');
  setTimeout(() => el.classList.remove('zichtbaar'), 2200);
}

function tekenTotalen(data) {
  const totIn  = data.in.reduce((s, r) => s + r.bedrag, 0);
  const totUit = data.uit.reduce((s, r) => s + r.bedrag, 0);
  const saldo  = totIn - totUit;
  document.getElementById('totaalIn').textContent  = fmt(totIn);
  document.getElementById('totaalUit').textContent = fmt(totUit);
  document.getElementById('labelIn').textContent   = fmt(totIn);
  document.getElementById('labelUit').textContent  = fmt(totUit);
  const el = document.getElementById('saldoBedrag');
  el.textContent = fmt(saldo);
  el.className = 'saldo-bedrag ' + (totIn === 0 && totUit === 0 ? 'nul' : saldo >= 0 ? 'ok' : 'over');
}

function tekenLijst(type, data) {
  const el = document.getElementById(type === 'in' ? 'lijstIn' : 'lijstUit');
  if (!data[type].length) { el.innerHTML = ''; return; }
  el.innerHTML = data[type].map(r => `
    <div class="rij">
      <div class="rij-naam">
        <input type="text" value="${esc(r.naam)}" placeholder="Omschrijving"
          onchange="updateNaam('${type}',${r.id},this.value)">
      </div>
      <div class="rij-bedrag">
        <input type="number" value="${r.bedrag || ''}" placeholder="0,00"
          min="0" step="0.01" inputmode="decimal"
          onchange="updateBedrag('${type}',${r.id},this.value)">
      </div>
      <button class="del-btn" onclick="verwijder('${type}',${r.id})">✕</button>
    </div>`).join('');
}

function teken() {
  document.getElementById('maandLabel').textContent = MAANDEN[huidigMaand] + ' ' + huidigJaar;
  const data = laad();
  tekenTotalen(data);
  tekenLijst('in', data);
  tekenLijst('uit', data);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── PDF ──
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const data = laad();
  const maandNaam = MAANDEN[huidigMaand] + ' ' + huidigJaar;
  const totIn  = data.in.reduce((s,r)=>s+r.bedrag,0);
  const totUit = data.uit.reduce((s,r)=>s+r.bedrag,0);
  const saldo  = totIn - totUit;
  const W = doc.internal.pageSize.getWidth();

  // Header
  doc.setFillColor(28,31,38);
  doc.rect(0,0,W,28,'F');
  doc.setTextColor(226,228,236); doc.setFontSize(18); doc.setFont('helvetica','bold');
  doc.text('Budgetplan', 14, 12);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(122,127,146);
  doc.text(maandNaam, 14, 20);
  doc.text(new Date().toLocaleDateString('nl-NL'), W-14, 20, { align:'right' });

  // Samenvattingsblokken
  const bY=34, bH=20, bW=(W-28)/3;
  [
    ['INKOMSTEN', 'EUR ' + totIn.toFixed(2).replace('.',','), [30,200,126]],
    ['UITGAVEN',  'EUR ' + totUit.toFixed(2).replace('.',','), [240,72,72]],
    ['SALDO', (saldo<0?'- ':'')+'EUR '+Math.abs(saldo).toFixed(2).replace('.',','), saldo>=0?[30,200,126]:[240,72,72]]
  ].forEach(([lbl, val, clr], i) => {
    const x = 14 + i*bW;
    doc.setFillColor(22,25,32); doc.roundedRect(x,bY,bW-4,bH,3,3,'F');
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(122,127,146);
    doc.text(lbl, x+4, bY+6);
    doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(...clr);
    doc.text(val, x+4, bY+14);
  });

  let y = bY + 26;

  // Inkomsten tabel
  if (data.in.length) {
    doc.autoTable({
      startY: y,
      head: [['Inkomsten', 'Bedrag']],
      body: data.in.map(r => [r.naam, 'EUR ' + r.bedrag.toFixed(2).replace('.',',')]),
      foot: [['Totaal inkomsten', 'EUR ' + totIn.toFixed(2).replace('.',',')]],
      styles: { font:'helvetica', fontSize:9, cellPadding:3.5, textColor:[200,202,210], fillColor:[28,31,38], lineColor:[42,47,61], lineWidth:0.3 },
      headStyles: { fillColor:[22,35,28], textColor:[30,200,126], fontStyle:'bold', fontSize:8 },
      footStyles: { fillColor:[22,35,28], textColor:[30,200,126], fontStyle:'bold' },
      alternateRowStyles: { fillColor:[22,25,32] },
      columnStyles: { 0:{cellWidth:'auto'}, 1:{cellWidth:40, halign:'right'} },
      margin: { left:14, right:14 },
    });
    y = doc.lastAutoTable.finalY + 6;
  }

  // Uitgaven tabel
  if (data.uit.length) {
    doc.autoTable({
      startY: y,
      head: [['Uitgaven', 'Bedrag']],
      body: data.uit.map(r => [r.naam, 'EUR ' + r.bedrag.toFixed(2).replace('.',',')]),
      foot: [['Totaal uitgaven', 'EUR ' + totUit.toFixed(2).replace('.',',')]],
      styles: { font:'helvetica', fontSize:9, cellPadding:3.5, textColor:[200,202,210], fillColor:[28,31,38], lineColor:[42,47,61], lineWidth:0.3 },
      headStyles: { fillColor:[35,22,22], textColor:[240,72,72], fontStyle:'bold', fontSize:8 },
      footStyles: { fillColor:[35,22,22], textColor:[240,72,72], fontStyle:'bold' },
      alternateRowStyles: { fillColor:[22,25,32] },
      columnStyles: { 0:{cellWidth:'auto'}, 1:{cellWidth:40, halign:'right'} },
      margin: { left:14, right:14 },
    });
  }

  // Footer
  const pH = doc.internal.pageSize.getHeight()-8;
  doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(60,65,80);
  doc.text('Budgetplan  |  '+maandNaam, 14, pH);
  doc.text('Pagina 1', W-14, pH, { align:'right' });

  doc.save('budgetplan-'+MAANDEN[huidigMaand].toLowerCase()+'-'+huidigJaar+'.pdf');
  toonToast('PDF opgeslagen ✓');
}

teken();
</script>
</body>
</html>
