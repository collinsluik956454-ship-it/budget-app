<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budgetplan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #13151a; --kaart: #1c1f26; --rand: #2a2f3d;
    --tekst: #e2e4ec; --zacht: #7a7f92;
    --groen: #1ec87e; --rood: #f04848; --blauw: #4f8ef7; --oranje: #f5a623;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--tekst); min-height: 100vh; padding-bottom: 3rem; }

  header { background: var(--kaart); border-bottom: 1px solid var(--rand); padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  .maand-nav { display: flex; align-items: center; gap: 0.5rem; font-size: 0.88rem; color: var(--zacht); }
  .nav-btn { background: var(--rand); border: none; color: var(--tekst); width: 30px; height: 30px; border-radius: 7px; cursor: pointer; font-size: 1rem; }
  .nav-btn:hover { background: #363b4f; }

  .pagina { max-width: 750px; margin: 0 auto; padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 1rem; }

  /* Saldo */
  .saldo-balk { background: var(--kaart); border: 1px solid var(--rand); border-radius: 14px; padding: 1.25rem 1.5rem; display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: center; }
  .saldo-hoofd { flex: 1; min-width: 140px; }
  .saldo-label { font-size: 0.7rem; color: var(--zacht); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.2rem; }
  .saldo-bedrag { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; transition: color 0.2s; }
  .saldo-bedrag.ok   { color: var(--groen); }
  .saldo-bedrag.over { color: var(--rood); }
  .saldo-bedrag.nul  { color: var(--zacht); }
  .mini-stats { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .mini-stat { background: #161920; border-radius: 10px; padding: 0.65rem 1rem; min-width: 110px; }
  .mini-label { font-size: 0.67rem; color: var(--zacht); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.15rem; }
  .mini-waarde { font-size: 1.1rem; font-weight: 700; }
  .mini-waarde.groen { color: var(--groen); }
  .mini-waarde.rood  { color: var(--rood); }

  /* Tabs */
  .tabs { display: flex; gap: 0.4rem; }
  .tab { padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--rand); background: transparent; color: var(--zacht); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .tab:hover { background: var(--rand); }
  .tab.actief-in  { background: rgba(30,200,126,0.12); border-color: var(--groen); color: var(--groen); }
  .tab.actief-uit { background: rgba(240,72,72,0.12); border-color: var(--rood); color: var(--rood); }
  .tab.actief-cat { background: rgba(79,142,247,0.12); border-color: var(--blauw); color: var(--blauw); }

  /* Sectie */
  .sectie { background: var(--kaart); border: 1px solid var(--rand); border-radius: 14px; overflow: hidden; }
  .sectie-header { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.1rem; border-bottom: 1px solid var(--rand); }
  .sectie-titel { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .sectie-titel.groen { color: var(--groen); }
  .sectie-titel.rood  { color: var(--rood); }
  .sectie-titel.blauw { color: var(--blauw); }
  .sectie-totaal { font-size: 1rem; font-weight: 700; }
  .sectie-totaal.groen { color: var(--groen); }
  .sectie-totaal.rood  { color: var(--rood); }

  /* Toevoegblok */
  .toevoeg-blok { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem 1rem; border-bottom: 1px solid var(--rand); background: #161920; }
  .toevoeg-blok input[type="text"] { flex: 1; min-width: 110px; background: var(--kaart); border: 1px solid var(--rand); border-radius: 7px; padding: 0.55rem 0.75rem; color: var(--tekst); font-size: 0.9rem; outline: none; }
  .toevoeg-blok input[type="text"]:focus { border-color: var(--blauw); }
  .toevoeg-blok input[type="number"] { width: 90px; background: var(--kaart); border: 1px solid var(--rand); border-radius: 7px; padding: 0.55rem 0.6rem; color: var(--tekst); font-size: 0.9rem; outline: none; text-align: right; }
  .toevoeg-blok input[type="number"]:focus { border-color: var(--blauw); }
  .toevoeg-blok select { background: var(--kaart); border: 1px solid var(--rand); border-radius: 7px; padding: 0.55rem 0.5rem; color: var(--tekst); font-size: 0.85rem; outline: none; cursor: pointer; -webkit-appearance: none; max-width: 130px; }
  .toevoeg-blok select:focus { border-color: var(--blauw); }
  .toevoeg-blok button { background: var(--blauw); border: none; color: #fff; border-radius: 7px; padding: 0.55rem 1rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; }
  .toevoeg-blok button:hover { opacity: 0.85; }

  /* Rijen */
  .rij { display: flex; align-items: center; gap: 0.5rem; padding: 0.65rem 1rem; border-bottom: 1px solid var(--rand); flex-wrap: wrap; }
  .rij:last-child { border-bottom: none; }
  .rij-naam { flex: 1; min-width: 90px; font-size: 0.92rem; }
  .cat-tag { display: inline-block; font-size: 0.68rem; padding: 0.15rem 0.4rem; border-radius: 5px; background: #2a2f3d; color: var(--zacht); margin-left: 0.3rem; white-space: nowrap; }
  .rij-bedrag input { background: #161920; border: 1px solid var(--rand); border-radius: 7px; padding: 0.38rem 0.55rem; color: var(--tekst); font-size: 0.88rem; width: 90px; outline: none; text-align: right; }
  .rij-bedrag input:focus { border-color: var(--blauw); }
  .freq-select { background: #161920; border: 1px solid var(--rand); border-radius: 6px; padding: 0.3rem 0.4rem; color: var(--tekst); font-size: 0.78rem; outline: none; cursor: pointer; -webkit-appearance: none; max-width: 100px; }
  .freq-select:focus { border-color: var(--blauw); }
  .rij-per-maand { font-size: 0.75rem; color: var(--oranje); min-width: 80px; text-align: right; white-space: nowrap; }
  .del-btn { background: none; border: none; color: var(--rand); cursor: pointer; font-size: 1rem; transition: color 0.15s; flex-shrink: 0; }
  .del-btn:hover { color: var(--rood); }
  .leeg-rij { padding: 0.75rem 1rem; color: var(--zacht); font-size: 0.85rem; font-style: italic; }

  /* Categorieoverzicht */
  .cat-overzicht { display: flex; flex-direction: column; gap: 0.5rem; padding: 0.75rem 1rem; }
  .cat-rij { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 0.9rem; background: #161920; border-radius: 8px; }
  .cat-rij-naam { font-size: 0.9rem; font-weight: 600; }
  .cat-rij-bedrag { font-size: 0.9rem; font-weight: 700; color: var(--rood); }
  .cat-rij-bedrag.groen { color: var(--groen); }

  /* Categoriebeheer */
  .cat-beheer-blok { display: flex; gap: 0.5rem; padding: 0.75rem 1rem; border-bottom: 1px solid var(--rand); background: #161920; }
  .cat-beheer-blok input { flex: 1; background: var(--kaart); border: 1px solid var(--rand); border-radius: 7px; padding: 0.55rem 0.75rem; color: var(--tekst); font-size: 0.9rem; outline: none; }
  .cat-beheer-blok input:focus { border-color: var(--blauw); }
  .cat-beheer-blok button { background: var(--blauw); border: none; color: #fff; border-radius: 7px; padding: 0.55rem 0.9rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .cat-lijst-item { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; border-bottom: 1px solid var(--rand); font-size: 0.9rem; }
  .cat-lijst-item:last-child { border-bottom: none; }

  /* Verborgen */
  .verborgen { display: none; }

  .acties { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .actie-knop { padding: 0.65rem 1rem; border-radius: 8px; border: 1px solid var(--rand); background: transparent; color: var(--zacht); font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
  .actie-knop:hover { background: var(--rand); color: var(--tekst); }
  .actie-knop.pdf { border-color: var(--blauw); color: var(--blauw); }
  .actie-knop.pdf:hover { background: rgba(79,142,247,0.1); }

  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #2a2f3d; color: var(--tekst); padding: 0.65rem 1.25rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 99; white-space: nowrap; }
  .toast.zichtbaar { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>📋 Budgetplan</h1>
  <div class="maand-nav">
    <button class="nav-btn" id="btnVorig">‹</button>
    <span id="maandLabel" style="min-width:130px;text-align:center"></span>
    <button class="nav-btn" id="btnVolgend">›</button>
  </div>
</header>

<div class="pagina">

  <!-- Saldo -->
  <div class="saldo-balk">
    <div class="saldo-hoofd">
      <div class="saldo-label">Wat je overhoudt per maand</div>
      <div class="saldo-bedrag nul" id="saldoBedrag">€ 0,00</div>
    </div>
    <div class="mini-stats">
      <div class="mini-stat">
        <div class="mini-label">Inkomsten</div>
        <div class="mini-waarde groen" id="totaalIn">€ 0,00</div>
      </div>
      <div class="mini-stat">
        <div class="mini-label">Uitgaven</div>
        <div class="mini-waarde rood" id="totaalUit">€ 0,00</div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab actief-in"  id="tabIn">＋ Inkomsten</button>
    <button class="tab"            id="tabUit">－ Uitgaven</button>
    <button class="tab"            id="tabCat">📂 Categorieën</button>
  </div>

  <!-- Inkomsten sectie -->
  <div class="sectie" id="sectieIn">
    <div class="sectie-header">
      <span class="sectie-titel groen">＋ Inkomsten</span>
      <span class="sectie-totaal groen" id="labelIn">€ 0,00</span>
    </div>
    <div class="toevoeg-blok">
      <input type="text"   id="inNaam"   placeholder="Omschrijving">
      <input type="number" id="inBedrag" placeholder="€ 0,00" min="0" step="0.01" inputmode="decimal">
      <select id="inFreq">
        <option value="maand">Per maand</option>
        <option value="week">Per week</option>
        <option value="4weken">Per 4 weken</option>
        <option value="kwartaal">Per kwartaal</option>
      </select>
      <select id="inCat"><option value="">— Categorie —</option></select>
      <button id="btnInkomst">＋ Toevoegen</button>
    </div>
    <div id="lijstIn"><div class="leeg-rij">Nog geen inkomsten toegevoegd.</div></div>
  </div>

  <!-- Uitgaven sectie -->
  <div class="sectie verborgen" id="sectieUit">
    <div class="sectie-header">
      <span class="sectie-titel rood">－ Uitgaven</span>
      <span class="sectie-totaal rood" id="labelUit">€ 0,00</span>
    </div>
    <div class="toevoeg-blok">
      <input type="text"   id="uitNaam"   placeholder="Omschrijving">
      <input type="number" id="uitBedrag" placeholder="€ 0,00" min="0" step="0.01" inputmode="decimal">
      <select id="uitFreq">
        <option value="maand">Per maand</option>
        <option value="week">Per week</option>
        <option value="4weken">Per 4 weken</option>
        <option value="kwartaal">Per kwartaal</option>
      </select>
      <select id="uitCat"><option value="">— Categorie —</option></select>
      <button id="btnUitgave">＋ Toevoegen</button>
    </div>
    <div id="lijstUit"><div class="leeg-rij">Nog geen uitgaven toegevoegd.</div></div>
  </div>

  <!-- Categorieën sectie -->
  <div class="sectie verborgen" id="sectieCat">
    <div class="sectie-header">
      <span class="sectie-titel blauw">📂 Categorieën beheren</span>
    </div>
    <div class="cat-beheer-blok">
      <input type="text" id="nieuweCatNaam" placeholder="Nieuwe categorie (bv. Wonen)">
      <button id="btnCatToevoegen">＋ Toevoegen</button>
    </div>
    <div id="catLijst"></div>

    <!-- Overzicht per categorie -->
    <div class="sectie-header" style="margin-top:0.5rem; border-top: 1px solid var(--rand);">
      <span class="sectie-titel blauw">📊 Uitgaven per categorie</span>
    </div>
    <div class="cat-overzicht" id="catOverzicht"></div>
  </div>

  <!-- Acties -->
  <div class="acties">
    <button class="actie-knop pdf" id="btnPDF">📄 PDF Export</button>
    <button class="actie-knop"     id="btnKopieer">📋 Kopieer vorige maand</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var MAANDEN = ['Januari','Februari','Maart','April','Mei','Juni',
                 'Juli','Augustus','September','Oktober','November','December'];
  var jaar  = new Date().getFullYear();
  var maand = new Date().getMonth();
  var actieveTab = 'in';

  function sleutel()    { return 'bp4-' + jaar + '-' + maand; }
  function catSleutel() { return 'bp4-cats'; }

  function laad() {
    try { return JSON.parse(localStorage.getItem(sleutel()) || '{"in":[],"uit":[]}'); }
    catch(e) { return { in: [], uit: [] }; }
  }
  function sla(data) { localStorage.setItem(sleutel(), JSON.stringify(data)); }

  function laadCats() {
    try {
      var c = JSON.parse(localStorage.getItem(catSleutel()) || 'null');
      return c || ['Salaris','Wonen','Boodschappen','Transport','Abonnementen','Vrije tijd','Gezondheid','Overig'];
    } catch(e) { return ['Salaris','Wonen','Boodschappen','Transport','Abonnementen','Vrije tijd','Gezondheid','Overig']; }
  }
  function slaCats(cats) { localStorage.setItem(catSleutel(), JSON.stringify(cats)); }

  function perMaand(bedrag, freq) {
    if (freq === 'kwartaal') return bedrag / 3;
    if (freq === 'week')     return (bedrag * 52) / 12;
    if (freq === '4weken')   return (bedrag * 13) / 12;
    return bedrag;
  }

  function fmt(n) { return '€\u00a0' + Math.abs(n).toFixed(2).replace('.', ','); }

  function freqLabel(f) {
    return f === 'kwartaal' ? 'Per kwartaal' : f === 'week' ? 'Per week' : f === '4weken' ? 'Per 4 weken' : 'Per maand';
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function vulCatDropdowns() {
    var cats = laadCats();
    var opties = '<option value="">— Categorie —</option>' + cats.map(function(c) {
      return '<option value="' + esc(c) + '">' + esc(c) + '</option>';
    }).join('');
    document.getElementById('inCat').innerHTML  = opties;
    document.getElementById('uitCat').innerHTML = opties;
  }

  function herbereken() {
    var data = laad();
    var totIn  = data['in'].reduce(function(s,r)  { return s + perMaand(r.bedrag, r.freq||'maand'); }, 0);
    var totUit = data['uit'].reduce(function(s,r) { return s + perMaand(r.bedrag, r.freq||'maand'); }, 0);
    var saldo  = totIn - totUit;
    document.getElementById('totaalIn').textContent  = fmt(totIn);
    document.getElementById('totaalUit').textContent = fmt(totUit);
    document.getElementById('labelIn').textContent   = fmt(totIn);
    document.getElementById('labelUit').textContent  = fmt(totUit);
    var el = document.getElementById('saldoBedrag');
    el.textContent = (saldo < 0 ? '- ' : '') + fmt(saldo);
    el.className = 'saldo-bedrag ' + (totIn===0&&totUit===0 ? 'nul' : saldo>=0 ? 'ok' : 'over');
  }

  function maakRij(type, r) {
    var pm = perMaand(r.bedrag, r.freq||'maand');
    var isAnders = (r.freq && r.freq !== 'maand');
    return '<div class="rij rij-' + type + '" data-id="' + r.id + '">' +
      '<div class="rij-naam naam-cel">' + esc(r.naam) +
        (r.cat ? '<span class="cat-tag">' + esc(r.cat) + '</span>' : '') +
      '</div>' +
      '<div class="rij-bedrag"><input class="b-input" type="number" value="' + (r.bedrag||'') + '" placeholder="0,00" min="0" step="0.01" inputmode="decimal"></div>' +
      '<select class="freq-select">' +
        '<option value="maand"'    + ((!r.freq||r.freq==='maand')?' selected':'')    + '>Maand</option>' +
        '<option value="week"'     + (r.freq==='week'?' selected':'')     + '>Week</option>' +
        '<option value="4weken"'   + (r.freq==='4weken'?' selected':'')   + '>4 weken</option>' +
        '<option value="kwartaal"' + (r.freq==='kwartaal'?' selected':'') + '>Kwartaal</option>' +
      '</select>' +
      '<div class="rij-per-maand">' + (isAnders ? '→ ' + fmt(pm) + '/mnd' : '') + '</div>' +
      '<button class="del-btn" data-type="' + type + '" data-id="' + r.id + '">✕</button>' +
      '</div>';
  }

  function tekenRijen() {
    var data = laad();
    var lijstIn  = document.getElementById('lijstIn');
    var lijstUit = document.getElementById('lijstUit');
    lijstIn.innerHTML  = data['in'].length  ? data['in'].map(function(r)  { return maakRij('in',  r); }).join('') : '<div class="leeg-rij">Nog geen inkomsten toegevoegd.</div>';
    lijstUit.innerHTML = data['uit'].length ? data['uit'].map(function(r) { return maakRij('uit', r); }).join('') : '<div class="leeg-rij">Nog geen uitgaven toegevoegd.</div>';

    document.querySelectorAll('.b-input').forEach(function(el) {
      el.addEventListener('input', function() { slaVanDOM(); herbereken(); });
    });
    document.querySelectorAll('.freq-select').forEach(function(el) {
      el.addEventListener('change', function() { slaVanDOM(); herbereken(); tekenRijen(); });
    });
    document.querySelectorAll('.del-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        slaVanDOM();
        var type = btn.dataset.type;
        var id   = parseInt(btn.dataset.id);
        var data = laad();
        data[type] = data[type].filter(function(r) { return r.id !== id; });
        sla(data);
        teken();
      });
    });
  }

  function tekenCats() {
    var cats = laadCats();
    var data = laad();

    // Lijst beheer
    var catLijst = document.getElementById('catLijst');
    catLijst.innerHTML = cats.length ? cats.map(function(c) {
      return '<div class="cat-lijst-item"><span>' + esc(c) + '</span>' +
        '<button class="del-btn del-cat" data-cat="' + esc(c) + '">✕</button></div>';
    }).join('') : '<div class="leeg-rij">Nog geen categorieën.</div>';

    document.querySelectorAll('.del-cat').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cats = laadCats().filter(function(c) { return c !== btn.dataset.cat; });
        slaCats(cats);
        vulCatDropdowns();
        tekenCats();
      });
    });

    // Overzicht per categorie (uitgaven)
    var totalen = {};
    data['uit'].forEach(function(r) {
      var cat = r.cat || 'Geen categorie';
      totalen[cat] = (totalen[cat] || 0) + perMaand(r.bedrag, r.freq||'maand');
    });
    // Ook inkomsten per categorie
    var totIn = {};
    data['in'].forEach(function(r) {
      var cat = r.cat || 'Geen categorie';
      totIn[cat] = (totIn[cat] || 0) + perMaand(r.bedrag, r.freq||'maand');
    });

    var ov = document.getElementById('catOverzicht');
    var alleCats = Array.from(new Set(Object.keys(totalen).concat(Object.keys(totIn))));
    if (!alleCats.length) {
      ov.innerHTML = '<div class="leeg-rij">Geen transacties met categorieën.</div>';
      return;
    }
    ov.innerHTML = alleCats.map(function(c) {
      var uit = totalen[c] || 0;
      var inc = totIn[c]   || 0;
      var html = '<div class="cat-rij"><span class="cat-rij-naam">' + esc(c) + '</span><div style="display:flex;gap:0.75rem;">';
      if (inc > 0) html += '<span class="cat-rij-bedrag groen">+' + fmt(inc) + '</span>';
      if (uit > 0) html += '<span class="cat-rij-bedrag">-' + fmt(uit) + '</span>';
      html += '</div></div>';
      return html;
    }).join('');
  }

  function slaVanDOM() {
    var huidig = laad();
    var data = { in: [], uit: [] };

    document.querySelectorAll('.rij-in').forEach(function(rij) {
      var id = parseInt(rij.dataset.id);
      var bestaand = huidig['in'].find(function(r) { return r.id === id; }) || {};
      data['in'].push({
        id: id,
        naam: bestaand.naam || '',
        bedrag: parseFloat(rij.querySelector('.b-input').value) || 0,
        freq: rij.querySelector('.freq-select').value,
        cat: bestaand.cat || ''
      });
    });

    document.querySelectorAll('.rij-uit').forEach(function(rij) {
      var id = parseInt(rij.dataset.id);
      var bestaand = huidig['uit'].find(function(r) { return r.id === id; }) || {};
      data['uit'].push({
        id: id,
        naam: bestaand.naam || '',
        bedrag: parseFloat(rij.querySelector('.b-input').value) || 0,
        freq: rij.querySelector('.freq-select').value,
        cat: bestaand.cat || ''
      });
    });

    sla(data);
  }

  function voegToe(type) {
    var naamEl   = document.getElementById(type==='in' ? 'inNaam'   : 'uitNaam');
    var bedragEl = document.getElementById(type==='in' ? 'inBedrag' : 'uitBedrag');
    var freqEl   = document.getElementById(type==='in' ? 'inFreq'   : 'uitFreq');
    var catEl    = document.getElementById(type==='in' ? 'inCat'    : 'uitCat');
    var naam = naamEl.value.trim();
    if (!naam) { naamEl.focus(); return; }
    var data = laad();
    data[type].push({
      id: Date.now(),
      naam: naam,
      bedrag: parseFloat(bedragEl.value) || 0,
      freq: freqEl.value,
      cat: catEl.value
    });
    sla(data);
    naamEl.value = ''; bedragEl.value = ''; freqEl.value = 'maand'; catEl.value = '';
    naamEl.focus();
    teken();
  }

  function teken() {
    document.getElementById('maandLabel').textContent = MAANDEN[maand] + ' ' + jaar;
    vulCatDropdowns();
    tekenRijen();
    tekenCats();
    herbereken();
    // Tab zichtbaarheid
    document.getElementById('sectieIn').className  = 'sectie' + (actieveTab==='in'  ? '' : ' verborgen');
    document.getElementById('sectieUit').className = 'sectie' + (actieveTab==='uit' ? '' : ' verborgen');
    document.getElementById('sectieCat').className = 'sectie' + (actieveTab==='cat' ? '' : ' verborgen');
    document.getElementById('tabIn').className  = 'tab' + (actieveTab==='in'  ? ' actief-in'  : '');
    document.getElementById('tabUit').className = 'tab' + (actieveTab==='uit' ? ' actief-uit' : '');
    document.getElementById('tabCat').className = 'tab' + (actieveTab==='cat' ? ' actief-cat' : '');
  }

  function toonToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('zichtbaar');
    setTimeout(function() { el.classList.remove('zichtbaar'); }, 2200);
  }

  // Tabs
  document.getElementById('tabIn').addEventListener('click',  function() { actieveTab='in';  teken(); });
  document.getElementById('tabUit').addEventListener('click', function() { actieveTab='uit'; teken(); });
  document.getElementById('tabCat').addEventListener('click', function() { actieveTab='cat'; teken(); });

  // Navigatie
  document.getElementById('btnVorig').addEventListener('click', function() {
    maand--; if (maand<0) { maand=11; jaar--; } teken();
  });
  document.getElementById('btnVolgend').addEventListener('click', function() {
    maand++; if (maand>11) { maand=0; jaar++; } teken();
  });

  // Toevoegen
  document.getElementById('btnInkomst').addEventListener('click', function() { voegToe('in'); });
  document.getElementById('btnUitgave').addEventListener('click', function() { voegToe('uit'); });
  document.getElementById('inBedrag').addEventListener('keydown',  function(e) { if(e.key==='Enter') voegToe('in'); });
  document.getElementById('uitBedrag').addEventListener('keydown', function(e) { if(e.key==='Enter') voegToe('uit'); });
  document.getElementById('inNaam').addEventListener('keydown',    function(e) { if(e.key==='Enter') document.getElementById('inBedrag').focus(); });
  document.getElementById('uitNaam').addEventListener('keydown',   function(e) { if(e.key==='Enter') document.getElementById('uitBedrag').focus(); });

  // Categorie toevoegen
  document.getElementById('btnCatToevoegen').addEventListener('click', function() {
    var naam = document.getElementById('nieuweCatNaam').value.trim();
    if (!naam) return;
    var cats = laadCats();
    if (cats.indexOf(naam) === -1) { cats.push(naam); slaCats(cats); }
    document.getElementById('nieuweCatNaam').value = '';
    vulCatDropdowns();
    tekenCats();
    toonToast(naam + ' toegevoegd \u2713');
  });
  document.getElementById('nieuweCatNaam').addEventListener('keydown', function(e) {
    if (e.key==='Enter') document.getElementById('btnCatToevoegen').click();
  });

  // Kopieer vorige maand
  document.getElementById('btnKopieer').addEventListener('click', function() {
    var vM=maand-1, vJ=jaar;
    if(vM<0){vM=11;vJ--;}
    var oud=null;
    try{oud=JSON.parse(localStorage.getItem('bp4-'+vJ+'-'+vM));}catch(e){}
    if(!oud){toonToast('Geen plan gevonden voor vorige maand.');return;}
    var huidig=laad();
    if((huidig['in'].length||huidig['uit'].length)&&!confirm('Huidige inhoud vervangen?'))return;
    sla({
      in:  oud['in'].map(function(r){return{id:Date.now()+Math.random(),naam:r.naam,bedrag:r.bedrag,freq:r.freq||'maand',cat:r.cat||''};}) ,
      uit: oud['uit'].map(function(r){return{id:Date.now()+Math.random(),naam:r.naam,bedrag:r.bedrag,freq:r.freq||'maand',cat:r.cat||''};})
    });
    teken();
    toonToast('Gekopieerd van '+MAANDEN[vM]+' \u2713');
  });

  // PDF
  document.getElementById('btnPDF').addEventListener('click', function() {
    slaVanDOM();
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    var data=laad();
    var maandNaam=MAANDEN[maand]+' '+jaar;
    var totIn  = data['in'].reduce(function(s,r){return s+perMaand(r.bedrag,r.freq||'maand');},0);
    var totUit = data['uit'].reduce(function(s,r){return s+perMaand(r.bedrag,r.freq||'maand');},0);
    var saldo  = totIn-totUit;
    var W=doc.internal.pageSize.getWidth();

    doc.setFillColor(28,31,38); doc.rect(0,0,W,28,'F');
    doc.setTextColor(226,228,236); doc.setFontSize(18); doc.setFont('helvetica','bold');
    doc.text('Budgetplan',14,12);
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(122,127,146);
    doc.text(maandNaam,14,20);
    doc.text(new Date().toLocaleDateString('nl-NL'),W-14,20,{align:'right'});

    var bY=34,bH=20,bW=(W-28)/3;
    [['INKOMSTEN/MND','EUR '+totIn.toFixed(2).replace('.',','),[30,200,126]],
     ['UITGAVEN/MND', 'EUR '+totUit.toFixed(2).replace('.',','),[240,72,72]],
     ['OVERBLIJFT',(saldo<0?'- ':'')+'EUR '+Math.abs(saldo).toFixed(2).replace('.',','),saldo>=0?[30,200,126]:[240,72,72]]
    ].forEach(function(item,i){
      var x=14+i*bW;
      doc.setFillColor(22,25,32); doc.roundedRect(x,bY,bW-4,bH,3,3,'F');
      doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(122,127,146);
      doc.text(item[0],x+4,bY+6);
      doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(item[2][0],item[2][1],item[2][2]);
      doc.text(item[1],x+4,bY+14);
    });

    var y=bY+26;

    if(data['in'].length){
      doc.autoTable({
        startY:y,
        head:[['Inkomsten','Categorie','Frequentie','Bedrag','Per maand']],
        body:data['in'].map(function(r){
          var pm=perMaand(r.bedrag,r.freq||'maand');
          return[r.naam,r.cat||'-',freqLabel(r.freq||'maand'),'EUR '+r.bedrag.toFixed(2).replace('.',','),(r.freq&&r.freq!=='maand')?'EUR '+pm.toFixed(2).replace('.',','):'-'];
        }),
        foot:[['Totaal inkomsten per maand','','','','EUR '+totIn.toFixed(2).replace('.',',')]],
        styles:{font:'helvetica',fontSize:8,cellPadding:3,textColor:[200,202,210],fillColor:[28,31,38],lineColor:[42,47,61],lineWidth:0.3},
        headStyles:{fillColor:[22,35,28],textColor:[30,200,126],fontStyle:'bold',fontSize:7.5},
        footStyles:{fillColor:[22,35,28],textColor:[30,200,126],fontStyle:'bold'},
        alternateRowStyles:{fillColor:[22,25,32]},
        columnStyles:{0:{cellWidth:'auto'},1:{cellWidth:25},2:{cellWidth:22},3:{cellWidth:25,halign:'right'},4:{cellWidth:25,halign:'right'}},
        margin:{left:14,right:14},
      });
      y=doc.lastAutoTable.finalY+6;
    }

    if(data['uit'].length){
      doc.autoTable({
        startY:y,
        head:[['Uitgaven','Categorie','Frequentie','Bedrag','Per maand']],
        body:data['uit'].map(function(r){
          var pm=perMaand(r.bedrag,r.freq||'maand');
          return[r.naam,r.cat||'-',freqLabel(r.freq||'maand'),'EUR '+r.bedrag.toFixed(2).replace('.',','),(r.freq&&r.freq!=='maand')?'EUR '+pm.toFixed(2).replace('.',','):'-'];
        }),
        foot:[['Totaal uitgaven per maand','','','','EUR '+totUit.toFixed(2).replace('.',',')]],
        styles:{font:'helvetica',fontSize:8,cellPadding:3,textColor:[200,202,210],fillColor:[28,31,38],lineColor:[42,47,61],lineWidth:0.3},
        headStyles:{fillColor:[35,22,22],textColor:[240,72,72],fontStyle:'bold',fontSize:7.5},
        footStyles:{fillColor:[35,22,22],textColor:[240,72,72],fontStyle:'bold'},
        alternateRowStyles:{fillColor:[22,25,32]},
        columnStyles:{0:{cellWidth:'auto'},1:{cellWidth:25},2:{cellWidth:22},3:{cellWidth:25,halign:'right'},4:{cellWidth:25,halign:'right'}},
        margin:{left:14,right:14},
      });
    }

    var pH=doc.internal.pageSize.getHeight()-8;
    doc.setFontSize(7.5); doc.setFont('helvetica','normal'); doc.setTextColor(60,65,80);
    doc.text('Budgetplan  |  '+maandNaam,14,pH);
    doc.text('Pagina 1',W-14,pH,{align:'right'});
    doc.save('budgetplan-'+MAANDEN[maand].toLowerCase()+'-'+jaar+'.pdf');
    toonToast('PDF opgeslagen \u2713');
  });

  teken();
})();
</script>
</body>
</html>
